<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YChatBot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🤖 YChatBot</h1>

        <div id="chat-box"></div>

        <div id="teach-box" style="display:none; margin-bottom:20px;">

            <input
                type="text"
                id="answer-input"
                placeholder="Enter the correct answer">

            <br><br>

            <input
                type="text"
                id="topic-input"
                placeholder="Enter the topic">

            <br><br>

            <button id="teach-btn">
                Teach YChatBot
            </button>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Ask me anything...">

            <button id="send-btn">
                Send
            </button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
